<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - URBAN STYLE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">URBAN<span>STYLE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#">Hombre</a></li>
            <li><a href="#">Mujer</a></li>
            <li><a href="#">Accesorios</a></li>
            <li><a href="#">Ofertas</a></li>
        </ul>
        <div class="nav-icons">
            <a href="#">Buscar</a>
            <a href="#">Carrito (0)</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Bienvenido de nuevo</h2>
            <p class="subtitle">Ingresa a tu cuenta para continuar</p>

            <form>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <div class="form-row">
                    <label>
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="button" class="btn">INICIAR SESIÓN</button>

                <div class="divider">o</div>

                <button type="button" class="btn btn-outline" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;width:100%;">
                    Continuar con Google
                </button>

                <p class="signup-text">
                    ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
